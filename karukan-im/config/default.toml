# Karukan IME デフォルト設定
# このファイルは ~/.config/karukan-im/config.toml にコピーして使用してください

[conversion]
# ライブ変換中に生成するモデル候補数
live_num_candidates = 3
# 変換候補数（Space押下時）
num_candidates = 9
# 周辺テキスト（カーソル左側の確定済みテキスト）を変換時のコンテキストとして使用する
use_context = true
# 変換API に渡す周辺テキストの最大文字数
max_context_length = 10
# ライブ変換で1回のGPT2変換が扱う読みの最大文字数。
# 入力をこの長さごとのチャンクに内部分割し、各チャンクを個別に変換することで
# 長文推論1回あたりの処理量を抑える。
# 各チャンクの左コンテキストは直前までのチャンクの変換結果になる。
composing_chunk_len = 30
# ライブ推論の開始間隔（ミリ秒）。待機中の要求は常に最新入力で上書きする。
live_inference_interval_ms = 200
# ライブ変換とSpace変換の両方で使うモデルID（省略時はregistry default）
model = "jinen-v1-small-q5"
# 推論スレッド数（0 = 全コア使用）
n_threads = 4
# 起動時にライブ変換を有効にする
live_conversion = true
# ユーザー辞書: ~/.local/share/karukan-im/user_dicts/ に辞書ファイルを配置（Mozc TSV or KRKN binary）

[learning]
# 変換学習を有効にする
enabled = true
# 学習エントリの最大数
max_entries = 10000
