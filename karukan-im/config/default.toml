# Karukan IME デフォルト設定
# このファイルは ~/Library/Application Support/com.karukan.karukan-im/config.toml
# にコピーして使用してください

[conversion]
# ライブ変換中に生成するモデル候補数
live_num_candidates = 3
# 変換候補数（Space押下時）
num_candidates = 9
# 周辺テキスト（カーソル左側の確定済みテキスト）を変換時のコンテキストとして使用する
use_context = true
# 変換API に渡す周辺テキストの最大文字数
max_context_length = 10
# ライブ変換で1回のGPT2変換が扱う読みの最大文字数。
# 入力をこの長さごとのチャンクに内部分割し、各チャンクを個別に変換することで
# 長文推論1回あたりの処理量を抑える。
# 各チャンクの左コンテキストは直前までのチャンクの変換結果になる。
composing_chunk_len = 30
# ライブ変換とSpace変換の両方で使うモデルID（省略時はregistry default）
model = "jinen-v1-small-q5"
# 推論スレッド数（0 = 全コア使用）
n_threads = 4
# 起動時にライブ変換を有効にする
live_conversion = true
# ユーザー辞書:
# ~/Library/Application Support/com.karukan.karukan-im/user_dicts/
# に辞書ファイルを配置（Mozc TSV or KRKN binary）

[learning]
# 明示的に修正した文節の学習を有効にする
enabled = true
# 文節修正エントリの最大数
max_entries = 10000
